<body>
    <div class="min-h-screen p-4 md:p-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-700">ADHD Assistant</h1>
            <p class="text-slate-600">Stay focused and organized</p>
        </header>

        <!-- Main Content -->
        <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Task Management Section -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-semibold mb-4 text-slate-700"><i class="bi bi-list-check"></i> Task List</h2>
                <div class="mb-4">
                    <input type="text" id="taskInput" placeholder="Add a new task..." class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="addTask()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded-lg w-full hover:bg-blue-600 transition">Add Task</button>
                </div>
                <ul id="taskList" class="space-y-2"></ul>
            </div>

            <!-- Pomodoro Timer Section -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-semibold mb-4 text-slate-700"><i class="bi bi-clock"></i> Focus Timer</h2>
                <div class="timer-card p-6 rounded-xl text-center">
                    <div id="timer" class="text-4xl font-bold text-slate-700 mb-4">25:00</div>
                    <div class="space-x-2">
                        <button onclick="startTimer()" id="startBtn" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">Start</button>
                        <button onclick="pauseTimer()" id="pauseBtn" class="bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600 transition" disabled="">Pause</button>
                        <button onclick="resetTimer()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">Reset</button>
                    </div>
                </div>
            </div>

            <!-- Mood Tracker -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-semibold mb-4 text-slate-700"><i class="bi bi-emoji-smile"></i> Mood Tracker</h2>
                <div class="grid grid-cols-5 gap-2">
                    <button onclick="trackMood(&#39;😊&#39;)" class="text-2xl p-2 hover:bg-gray-100 rounded">😊</button>
                    <button onclick="trackMood(&#39;😐&#39;)" class="text-2xl p-2 hover:bg-gray-100 rounded">😐</button>
                    <button onclick="trackMood(&#39;😔&#39;)" class="text-2xl p-2 hover:bg-gray-100 rounded">😔</button>
                    <button onclick="trackMood(&#39;😤&#39;)" class="text-2xl p-2 hover:bg-gray-100 rounded">😤</button>
                    <button onclick="trackMood(&#39;😴&#39;)" class="text-2xl p-2 hover:bg-gray-100 rounded">😴</button>
                </div>
                <div id="moodHistory" class="mt-4 text-sm text-slate-600"><div class="mb-1">5:12:26 PM: 😴</div></div>
            </div>

            <!-- Quick Notes -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-semibold mb-4 text-slate-700"><i class="bi bi-journal"></i> Quick Notes</h2>
                <textarea id="quickNotes" class="w-full h-32 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Write your thoughts here..."></textarea>
                <button onclick="saveNotes()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded-lg w-full hover:bg-blue-600 transition">Save Notes</button>
            </div>
        </div>
    </div>

    <script>
        // Task Management
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskList = document.getElementById('taskList');
            if (input.value.trim() !== '') {
                const li = document.createElement('li');
                li.className = 'flex items-center justify-between p-2 bg-gray-50 rounded-lg';
                li.innerHTML = `
                    <div class="flex items-center">
                        <input type="checkbox" class="mr-2" onclick="toggleTask(this)">
                        <span>${input.value}</span>
                    </div>
                    <button onclick="deleteTask(this)" class="text-red-500"><i class="bi bi-trash"></i></button>
                `;
                taskList.appendChild(li);
                input.value = '';
            }
        }

        function toggleTask(checkbox) {
            checkbox.parentElement.parentElement.classList.toggle('task-complete');
        }

        function deleteTask(button) {
            button.parentElement.remove();
        }

        // Pomodoro Timer
        let timeLeft = 1500; // 25 minutes in seconds
        let timerId = null;

        function startTimer() {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            timerId = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft === 0) {
                    clearInterval(timerId);
                    alert('Time is up! Take a break.');
                    resetTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerId);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
        }

        function resetTimer() {
            clearInterval(timerId);
            timeLeft = 1500;
            updateTimerDisplay();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Mood Tracking
        function trackMood(mood) {
            const history = document.getElementById('moodHistory');
            const date = new Date().toLocaleTimeString();
            history.innerHTML = `<div class="mb-1">${date}: ${mood}</div>` + history.innerHTML;
        }

        // Quick Notes
        function saveNotes() {
            const notes = document.getElementById('quickNotes').value;
            localStorage.setItem('adhd-notes', notes);
            alert('Notes saved successfully!');
        }

        // Load saved notes on page load
        document.addEventListener('DOMContentLoaded', () => {
            const savedNotes = localStorage.getItem('adhd-notes');
            if (savedNotes) {
                document.getElementById('quickNotes').value = savedNotes;
            }
        });
    </script>

</body></html>
